<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💣 لعبة الصناديق</title>
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#07080d;--s1:#0e1018;--s2:#141720;
  --b1:#1c2030;--b2:#252c3f;
  --tx:#dde1ec;--mt:#5a6278;
  --c0:#3b82f6;--c1:#f59e0b;--c2:#ef4444;--c3:#22c55e;
  --bm:#a855f7;
}
body{background:var(--bg);font-family:'Cairo',sans-serif;color:var(--tx);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:30px 30px;pointer-events:none;z-index:0;}

/* ─── SCREENS ─── */
.scr{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;}
.scr.off{display:none!important;}

/* ─── CARD ─── */
.card{width:min(400px,92vw);background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:26px 22px;position:relative;z-index:1;}
.logo{font-size:1.55rem;font-weight:900;text-align:center;margin-bottom:2px;
  background:linear-gradient(120deg,var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.sub{text-align:center;color:var(--mt);font-size:.72rem;margin-bottom:20px;}
.tabs{display:flex;border:1px solid var(--b2);border-radius:8px;overflow:hidden;margin-bottom:18px;}
.tab{flex:1;padding:9px;background:none;border:none;color:var(--mt);
  font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:.2s;}
.tab.on{background:var(--b2);color:var(--tx);}
lbl{display:block;font-size:.7rem;color:var(--mt);margin-bottom:4px;font-weight:700;}
inp{display:block;width:100%;padding:10px 12px;background:var(--s2);
  border:1px solid var(--b2);border-radius:7px;color:var(--tx);
  font-family:'Cairo',sans-serif;font-size:.87rem;outline:none;margin-bottom:13px;transition:.2s;}
inp:focus{border-color:var(--c1);}
inp::placeholder{color:var(--mt);}
.mrow{display:flex;gap:7px;margin-bottom:13px;}
.mopt{flex:1;padding:8px;background:var(--s2);border:1px solid var(--b1);
  border-radius:7px;color:var(--mt);font-family:'Cairo',sans-serif;
  font-size:.76rem;font-weight:700;cursor:pointer;transition:.2s;text-align:center;}
.mopt.on{background:rgba(245,158,11,.1);border-color:var(--c1);color:var(--c1);}
.bmain{width:100%;padding:12px;background:linear-gradient(135deg,var(--c1),#d97706);
  border:none;border-radius:9px;color:#000;font-family:'Cairo',sans-serif;
  font-size:.93rem;font-weight:900;cursor:pointer;transition:.15s;
  box-shadow:0 3px 14px rgba(245,158,11,.22);}
.bmain:active{transform:scale(.97);}
.bmain:disabled{opacity:.35;cursor:not-allowed;transform:none;}

/* ─── WAIT ─── */
.wcard{width:min(420px,92vw);background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:24px 20px;z-index:1;}
.wtit{font-size:.98rem;font-weight:900;text-align:center;margin-bottom:4px;}
.wcode{font-size:2rem;font-weight:900;letter-spacing:.22em;color:var(--c1);text-align:center;
  margin:8px 0;text-shadow:0 0 18px rgba(245,158,11,.28);}
.bcopy{display:block;margin:0 auto 10px;padding:6px 14px;background:var(--b2);border:none;
  border-radius:6px;color:var(--tx);font-family:'Cairo',sans-serif;font-size:.7rem;cursor:pointer;}
.plist{display:flex;flex-direction:column;gap:6px;margin:14px 0;}
.prow{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:7px;
  background:var(--s2);border:1px solid var(--b1);}
.pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.pnm{font-size:.86rem;font-weight:700;}
.pbdg{margin-right:auto;font-size:.6rem;padding:2px 7px;border-radius:20px;
  background:rgba(245,158,11,.1);color:var(--c1);}
.whint{text-align:center;color:var(--mt);font-size:.73rem;margin-bottom:9px;}
.bstart{width:100%;padding:12px;background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;border-radius:9px;color:#fff;font-family:'Cairo',sans-serif;
  font-size:.93rem;font-weight:900;cursor:pointer;box-shadow:0 3px 14px rgba(34,197,94,.22);}
.bstart:disabled{opacity:.35;cursor:not-allowed;}

/* ─── GAME SCREEN ─── */
#gs{position:fixed;inset:0;display:none;flex-direction:column;
  align-items:center;padding:5px 3px 68px;overflow-y:auto;z-index:1;}

.topbar{width:min(544px,99vw);display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.glg{font-size:.88rem;font-weight:900;color:var(--c1);flex-shrink:0;}
.tpill{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;
  border:1px solid var(--b2);background:var(--s1);color:var(--mt);
  transition:.25s;white-space:nowrap;}
.tpill.mine{border-color:var(--c1);color:var(--c1);background:rgba(245,158,11,.07);}

.pstrip{display:flex;gap:5px;width:min(544px,99vw);margin-bottom:5px;overflow-x:auto;scrollbar-width:none;}
.pstrip::-webkit-scrollbar{display:none;}
.pchip{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:20px;
  background:var(--s1);border:1px solid var(--b1);transition:.22s;}
.pchip.cur{border-color:var(--c1);box-shadow:0 0 9px rgba(245,158,11,.18);}
.pchip .cd{width:8px;height:8px;border-radius:50%;}
.pchip .cn{font-size:.66rem;font-weight:700;}
.pchip .cf{font-size:.58rem;}

.sbar{width:min(544px,99vw);padding:6px 11px;background:var(--s1);border:1px solid var(--b1);
  border-radius:7px;margin-bottom:6px;font-size:.77rem;color:var(--mt);text-align:center;
  min-height:32px;display:flex;align-items:center;justify-content:center;transition:.22s;}
.sbar.w{color:#ef4444;border-color:#ef4444;background:rgba(239,68,68,.05);}
.sbar.g{color:#22c55e;border-color:#22c55e;background:rgba(34,197,94,.05);}
.sbar.d{color:#f97316;border-color:#f97316;background:rgba(249,115,22,.05);}
.sbar.v{color:var(--c1);border-color:var(--c1);font-size:.92rem;font-weight:900;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;
  width:min(544px,99vw);touch-action:none;user-select:none;-webkit-user-select:none;}
.box{aspect-ratio:1;border-radius:4px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;position:relative;transition:background .1s,border-color .1s;border:1px solid transparent;}

/* closed */
.box.cl{background:var(--s2);border-color:var(--b1);}
.box.cl:active{background:#1a1e2c;}
/* hint */
.box.hn{background:#090b11;border-color:var(--b2);}
/* fire per player */
.box.f0{background:#050d1e;border-color:var(--c0);box-shadow:0 0 8px rgba(59,130,246,.3);}
.box.f1{background:#191000;border-color:var(--c1);box-shadow:0 0 8px rgba(245,158,11,.3);}
.box.f2{background:#190505;border-color:var(--c2);box-shadow:0 0 8px rgba(239,68,68,.3);}
.box.f3{background:#021306;border-color:var(--c3);box-shadow:0 0 8px rgba(34,197,94,.3);}
/* locked (permanent) */
.box.lk{background:#080a0f;border-color:#111420;cursor:not-allowed;opacity:.5;}
/* draw */
.box.dm{cursor:crosshair;}
.box.dp{background:#1b0d00!important;border-color:#f97316!important;box-shadow:0 0 5px rgba(249,115,22,.3)!important;}
/* anims */
.box.abl{animation:abl .4s ease;}
.box.aft{animation:aft .2s ease;}
.box.abw{animation:abw .6s ease forwards;}
.box.alk{animation:alk .28s ease;}
@keyframes abl{0%{transform:scale(1.16);background:#1e0030;border-color:var(--bm);}100%{transform:scale(1);}}
@keyframes aft{0%{background:#3a1400;border-color:#f97316;box-shadow:0 0 11px #f97316;}100%{background:var(--s2);border-color:var(--b1);}}
@keyframes abw{0%{transform:scale(1.25);background:#220040;border-color:var(--bm);box-shadow:0 0 32px var(--bm);}60%{transform:scale(.9);}100%{opacity:.08;transform:scale(1);}}
@keyframes alk{0%{transform:scale(1.08);}100%{transform:scale(1);}}
@keyframes pls{0%,100%{box-shadow:0 0 14px rgba(239,68,68,.3);}50%{box-shadow:0 0 28px rgba(239,68,68,.7);}}

/* ARROWS (no text/emoji — pure arrows only) */
.ah{display:flex;gap:2px;flex-wrap:wrap;align-items:center;justify-content:center;pointer-events:none;padding:1px;}
.aw{display:flex;align-items:center;justify-content:center;pointer-events:none;}
.ar{display:inline-block;width:0;height:0;--s:4.5px;filter:drop-shadow(0 0 2px var(--ac));}
.ar.up   {border-left:var(--s) solid transparent;border-right:var(--s) solid transparent;border-bottom:calc(var(--s)*1.8) solid var(--ac);}
.ar.down {border-left:var(--s) solid transparent;border-right:var(--s) solid transparent;border-top:calc(var(--s)*1.8) solid var(--ac);}
.ar.left {border-top:var(--s) solid transparent;border-bottom:var(--s) solid transparent;border-right:calc(var(--s)*1.8) solid var(--ac);}
.ar.right{border-top:var(--s) solid transparent;border-bottom:var(--s) solid transparent;border-left:calc(var(--s)*1.8) solid var(--ac);}
.ar.upleft,.ar.upright,.ar.downleft,.ar.downright{
  width:calc(var(--s)*1.1);height:calc(var(--s)*1.1);border:0;
  background:var(--ac);clip-path:polygon(50% 0%,100% 100%,0% 100%);}
.ar.upleft{transform:rotate(-45deg);}
.ar.upright{transform:rotate(45deg);}
.ar.downleft{transform:rotate(-135deg);}
.ar.downright{transform:rotate(135deg);}

/* FIRE IMAGE inside box */
.fimg{width:54%;height:54%;object-fit:contain;pointer-events:none;}

/* ACTION BAR */
.actbar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:6px;padding:9px;
  background:linear-gradient(transparent,var(--bg) 44%);justify-content:center;z-index:50;}
.bfuse{padding:10px 24px;background:linear-gradient(135deg,#ef4444,#b91c1c);
  border:none;border-radius:9px;color:#fff;font-family:'Cairo',sans-serif;
  font-size:.86rem;font-weight:900;cursor:pointer;display:none;animation:pls 1.3s infinite;}
.bcancel{padding:10px 15px;background:transparent;border:1px solid var(--b2);
  border-radius:9px;color:var(--mt);font-family:'Cairo',sans-serif;font-size:.8rem;cursor:pointer;display:none;}
.bconfirm{padding:10px 20px;background:linear-gradient(135deg,var(--c1),#d97706);
  border:none;border-radius:9px;color:#000;font-family:'Cairo',sans-serif;font-size:.86rem;font-weight:900;cursor:pointer;display:none;}

/* TOAST */
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-68px);
  background:var(--s1);border:1px solid var(--b2);border-radius:9px;padding:8px 16px;
  font-size:.78rem;font-weight:700;z-index:200;transition:transform .26s;
  pointer-events:none;box-shadow:0 5px 24px rgba(0,0,0,.5);white-space:nowrap;}
.toast.sh{transform:translateX(-50%) translateY(0);}
.toast.tg{color:#22c55e;border-color:#22c55e;}
.toast.tb{color:#ef4444;border-color:#ef4444;}
.toast.ti{color:var(--c1);border-color:var(--c1);}

/* WIN OVERLAY */
#wo{position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.82);backdrop-filter:blur(5px);}
.wcrd{background:var(--s1);border:1px solid var(--b2);border-radius:16px;padding:30px;
  text-align:center;width:min(330px,86vw);}
.wemj{font-size:2.8rem;margin-bottom:9px;}
.wtl{font-size:1.45rem;font-weight:900;margin-bottom:5px;}
.wsb{color:var(--mt);font-size:.8rem;margin-bottom:20px;}
.bagn{width:100%;padding:11px;background:linear-gradient(135deg,var(--c1),#d97706);
  border:none;border-radius:9px;color:#000;font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:900;cursor:pointer;}
.scores-box{margin:14px 0;display:flex;flex-direction:column;gap:6px;}
.score-row{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:7px;
  background:var(--s2);border:1px solid var(--b1);}
.score-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.score-nm{font-size:.82rem;font-weight:700;flex:1;}
.score-wins{font-size:.82rem;font-weight:900;color:var(--c1);}
.score-crown{font-size:.75rem;margin-right:2px;}

.conn{position:fixed;top:7px;left:7px;width:7px;height:7px;border-radius:50%;
  background:#ef4444;z-index:300;transition:.4s;}
.conn.ok{background:#22c55e;box-shadow:0 0 5px #22c55e;}
</style>
</head>
<body>

<div class="conn" id="conn"></div>
<div class="toast" id="toast"></div>

<!-- LOBBY -->
<div class="scr" id="SL">
<div class="card">
  <div class="logo">💣 لعبة الصناديق</div>
  <div class="sub">اكتشف شعلتك — ارسم الفتيل — فجّر القنبلة</div>
  <div class="tabs">
    <div class="tab on" id="T1" onclick="switchTab(1)">إنشاء غرفة</div>
    <div class="tab"    id="T2" onclick="switchTab(2)">انضمام</div>
  </div>
  <div id="F1">
    <lbl>اسمك</lbl>
    <inp id="cN" placeholder="اكتب اسمك..." maxlength="14" class="a"></inp>
    <lbl>نوع اللعبة</lbl>
    <div class="mrow">
      <div class="mopt on" id="MI" onclick="setMode('ind')">فردي 👤</div>
      <div class="mopt"    id="MT" onclick="setMode('team')">فرق 🤝</div>
    </div>
    <button class="bmain" onclick="doCreate()">🎲 إنشاء الغرفة</button>
  </div>
  <div id="F2" style="display:none">
    <lbl>اسمك</lbl>
    <inp id="jN" placeholder="اكتب اسمك..." maxlength="14" class="a"></inp>
    <lbl>كود الغرفة</lbl>
    <inp id="jC" placeholder="4 أحرف..." maxlength="4" style="letter-spacing:.15em;text-transform:uppercase;" class="a"></inp>
    <button class="bmain" onclick="doJoin()">🚀 انضمام</button>
  </div>
</div>
</div>

<!-- WAIT ROOM -->
<div class="scr off" id="SW">
<div class="wcard">
  <div class="wtit">⏳ انتظار اللاعبين</div>
  <div class="wcode" id="WC">----</div>
  <button class="bcopy" onclick="copyCode()">📋 نسخ الكود</button>
  <div class="plist" id="WL"></div>
  <div class="whint" id="WH">احتاج لاعبَين على الأقل</div>
  <button class="bstart" id="BS" onclick="doStart()" disabled>▶ بدء اللعبة</button>
</div>
</div>

<!-- GAME -->
<div id="gs">
  <div class="topbar">
    <div class="glg">💣</div>
    <div class="tpill" id="TP">...</div>
  </div>
  <div class="pstrip" id="PS"></div>
  <div class="sbar"   id="SB">جاري التحميل...</div>
  <div class="grid"   id="GR"></div>
</div>

<div class="actbar">
  <button class="bfuse"    id="BF" onclick="startDraw()">🔥 اشعل الفتيل</button>
  <button class="bcancel"  id="BC" onclick="cancelDraw()">✕ إلغاء</button>
  <button class="bconfirm" id="BX" onclick="doExplode()">💥 فجّر!</button>
</div>

<!-- WIN -->
<div id="wo">
<div class="wcrd">
  <div class="wemj" id="WE">🏆</div>
  <div class="wtl"  id="WT">فزت!</div>
  <div class="wsb"  id="WS"></div>
  <div class="scores-box" id="scoresBox"></div>
  <button class="bagn" id="BAgn" onclick="playAgain()">🔄 العب مرة أخرى</button>
  <button class="bagn" style="margin-top:8px;background:var(--b2);color:var(--tx);box-shadow:none;" onclick="location.reload()">🚪 خروج</button>
</div>
</div>

<script>
const ABLY_KEY = 'UcDcBw.YJJl6g:LDwkET05nlae7VeirAz44uL8hE16cLZ8MyrSFwCnolk';

/* ════ CONSTANTS ════ */
const COLS=10,TOTAL=100;
const PC=['#3b82f6','#f59e0b','#ef4444','#22c55e'];
const FC=['f0','f1','f2','f3'];
const DIR={'-1,0':'up','1,0':'down','0,-1':'right','0,1':'left',
  '-1,-1':'upright','-1,1':'upleft','1,-1':'downright','1,1':'downleft'};

/* ════ STATE ════ */
let ably,ch;
let myId='',myName='';
let roomCode='',isHost=false,gMode='ind';
let players=[];
// types[i] = 'empty' | 'fire_N' | 'bomb'
let types=[],cellSt=[];
// cellSt[i] = {s:'cl'|'hn'|'fire'|'lk', hints:[{pi,tgt,bomb}]}
let fpos={},bIdx=-1;
let turnIdx=0;
let myFire=-1,myFireOpen=false;
let gameOver=false;
let drawMode=false,drawing=false,path=[];

/* ════ UTILS ════ */
const uid=()=>Math.random().toString(36).slice(2,10);
const genCode=()=>{const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let s='';for(let i=0;i<4;i++)s+=c[Math.random()*c.length|0];return s;};
const cheb=(a,b)=>Math.max(Math.abs((a/COLS|0)-(b/COLS|0)),Math.abs(a%COLS-b%COLS));
const adj=(a,b)=>Math.abs((a/COLS|0)-(b/COLS|0))<=1&&Math.abs(a%COLS-b%COLS)<=1&&a!==b;
const shuf=a=>{for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
const wait=ms=>new Promise(r=>setTimeout(r,ms));
const myI=()=>players.findIndex(p=>p.id===myId);
const myTurn=()=>players[turnIdx]?.id===myId;
function sv(id,v){const e=document.getElementById(id);if(e)e.style.display=v?'':'none';}
function toast(msg,t='ti',d=2300){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+t;el.classList.add('sh');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('sh'),d);
}
function setS(txt,c=''){const e=document.getElementById('SB');e.textContent=txt;e.className='sbar '+(c||'');}

/* ════ LOBBY ════ */
function switchTab(n){
  document.getElementById('T1').classList.toggle('on',n===1);
  document.getElementById('T2').classList.toggle('on',n===2);
  sv('F1',n===1);sv('F2',n===2);
}
function setMode(m){
  gMode=m;
  document.getElementById('MI').classList.toggle('on',m==='ind');
  document.getElementById('MT').classList.toggle('on',m==='team');
}
// style inputs
document.querySelectorAll('inp').forEach(e=>{e.style.cssText='display:block;width:100%;padding:10px 12px;background:var(--s2);border:1px solid var(--b2);border-radius:7px;color:var(--tx);font-family:Cairo,sans-serif;font-size:.87rem;outline:none;margin-bottom:13px;transition:.2s;';
  e.addEventListener('focus',()=>e.style.borderColor='var(--c1)');
  e.addEventListener('blur',()=>e.style.borderColor='var(--b2)');
});

/* ════ ABLY ════ */
function initAbly(cb){
  myId=uid();
  ably=new Ably.Realtime({key:ABLY_KEY,clientId:myId});
  ably.connection.on('connected',()=>{document.getElementById('conn').classList.add('ok');cb();});
  ably.connection.on('failed',()=>toast('فشل الاتصال — تحقق من الـ API Key','tb',5000));
}
function subCh(code){
  ch=ably.channels.get('bg3-'+code);
  ch.subscribe('pj',m=>{
    if(m.clientId===myId)return;
    if(!players.find(p=>p.id===m.data.id)){players.push(m.data);renderWait();if(isHost)ch.publish('ps',players);}
  });
  ch.subscribe('ps',m=>{if(m.clientId===myId)return;players=m.data;renderWait();});
  ch.subscribe('gs',m=>{if(m.clientId===myId)return;applyGS(m.data);enterGame();});
  ch.subscribe('ac',m=>{if(m.clientId===myId)return;handleAC(m.data);});
  ch.subscribe('fu',m=>{if(m.clientId===myId)return;doRemoteFuse(m.data);});
  ch.subscribe('go',m=>{if(m.clientId===myId)return;showWin(m.data.wn,false,m.data.wid);});
}

/* ════ CREATE / JOIN ════ */
function doCreate(){
  const n=document.getElementById('cN').value.trim();
  if(!n){toast('اكتب اسمك','tb');return;}
  myName=n;roomCode=genCode();isHost=true;
  initAbly(()=>{
    subCh(roomCode);
    players=[{id:myId,name:myName,ci:0,team:0}];
    goTo('SL','SW');
    document.getElementById('WC').textContent=roomCode;
    renderWait();
  });
}
function doJoin(){
  const n=document.getElementById('jN').value.trim();
  const c=document.getElementById('jC').value.trim().toUpperCase();
  if(!n){toast('اكتب اسمك','tb');return;}
  if(c.length!==4){toast('الكود 4 أحرف','tb');return;}
  myName=n;roomCode=c;isHost=false;
  initAbly(()=>{
    subCh(roomCode);
    const ci=0; // host assigns final colors on start
    const me={id:myId,name:myName,ci,team:0};
    players.push(me);ch.publish('pj',me);
    goTo('SL','SW');
    document.getElementById('WC').textContent=roomCode;
    renderWait();
  });
}
function goTo(h,s){
  document.getElementById(h).classList.add('off');
  if(s)document.getElementById(s).classList.remove('off');
}
function copyCode(){navigator.clipboard.writeText(roomCode).then(()=>toast('تم نسخ الكود','tg'));}

/* ════ WAIT ROOM ════ */
function renderWait(){
  document.getElementById('WL').innerHTML=players.map((p,i)=>`
    <div class="prow">
      <div class="pdot" style="background:${PC[i%4]};box-shadow:0 0 5px ${PC[i%4]};"></div>
      <div class="pnm">${p.name}</div>
      ${i===0?'<div class="pbdg">منظّم</div>':''}
    </div>`).join('');
  const ok=players.length>=2;
  document.getElementById('BS').disabled=!ok||!isHost;
  document.getElementById('WH').textContent=!isHost?'انتظر المنظّم ليبدأ':ok?'جاهز للبدء!':'احتاج لاعبَين على الأقل';
}

/* ════ START ════ */
function doStart(){
  if(!isHost||players.length<2)return;
  players.forEach((p,i)=>{p.ci=i%4;p.team=i%2;});
  const s=buildGS();
  ch.publish('gs',s);
  applyGS(s);enterGame();
}
function buildGS(){
  const pos=shuf(Array.from({length:TOTAL},(_,i)=>i));
  const t=Array(TOTAL).fill('empty'),fp={};
  const n=players.length;
  for(let i=0;i<n;i++){t[pos[i]]='fire_'+i;fp[i]=pos[i];}
  const bi=pos[n];t[bi]='bomb';
  return{types:t,fpos:fp,bIdx:bi,players,gMode,turnIdx:0};
}
function applyGS(s){
  types=[...s.types];fpos={...s.fpos};bIdx=s.bIdx;
  players=[...s.players];gMode=s.gMode;turnIdx=s.turnIdx||0;
  cellSt=Array.from({length:TOTAL},()=>({s:'cl',hints:[]}));
  gameOver=drawMode=drawing=false;path=[];
  myFireOpen=false;
  // find my fire position
  const mi=myI();
  myFire=fpos[mi]??-1;
}

/* ════ ENTER GAME ════ */
function enterGame(){
  document.getElementById('SW').classList.add('off');
  const gs=document.getElementById('gs');gs.style.display='flex';
  buildGrid();renderStrip();updateTurn();
  setS('دورك: افتح صندوق واحد 🔍','');
}

/* ═ GRID ═ */
function buildGrid(){
  const g=document.getElementById('GR');g.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const b=document.createElement('div');
    b.id='b'+i;b.className='box cl';
    if(drawMode)b.classList.add('dm');
    b.addEventListener('pointerdown',e=>{if(drawMode)startPath(e,i);});
    b.addEventListener('pointerover',e=>{if(drawMode&&drawing)extPath(i);});
    b.addEventListener('pointerup',()=>{if(drawMode){drawing=false;sv('BX',path.length>1);}});
    b.addEventListener('click',()=>{if(!drawMode)tapBox(i);});
    g.appendChild(b);renderCell(i);
  }
}
function renderCell(i){
  const el=document.getElementById('b'+i);if(!el)return;
  const cs=cellSt[i];
  el.innerHTML='';
  // base classes
  el.className='box';
  if(drawMode)el.classList.add('dm');

  if(cs.s==='cl'){el.classList.add('cl');}
  else if(cs.s==='lk'){el.classList.add('lk');}
  else if(cs.s==='fire'){
    const pi=parseInt(types[i].split('_')[1]);
    el.classList.add(FC[pi%4]);
    // 🔥 image slot — replace src with your actual flame image per player
    const img=document.createElement('img');
    img.className='fimg';
    // Each player's flame image — set to a colored SVG by default
    // You can replace these with: img.src = 'flame_blue.png' etc.
    const flameSVGs=[
      `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='12' fill='%233b82f6' opacity='.8'/><text x='8' y='22' font-size='16'>🔥</text></svg>`,
      `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='12' fill='%23f59e0b' opacity='.8'/><text x='8' y='22' font-size='16'>🔥</text></svg>`,
      `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='12' fill='%23ef4444' opacity='.8'/><text x='8' y='22' font-size='16'>🔥</text></svg>`,
      `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='12' fill='%2322c55e' opacity='.8'/><text x='8' y='22' font-size='16'>🔥</text></svg>`,
    ];
    img.src='data:image/svg+xml,'+flameSVGs[pi%4];
    el.appendChild(img);
  }
  else if(cs.s==='hn'){
    el.classList.add('hn');
    if(cs.hints.length){
      const h=document.createElement('div');h.className='ah';
      cs.hints.forEach(hint=>{
        // color: bomb=purple, fire=player color
        const col=hint.bomb?'#a855f7':PC[hint.pi%4];
        const dr=Math.sign((hint.tgt/COLS|0)-(i/COLS|0));
        const dc=Math.sign(hint.tgt%COLS-i%COLS);
        const dir=DIR[`${dr},${dc}`]||'up';
        const w=document.createElement('div');w.className='aw';
        const a=document.createElement('span');
        a.className='ar '+dir;
        a.style.setProperty('--ac',col);
        w.appendChild(a);h.appendChild(w);
      });
      el.appendChild(h);
    }
  }
}

/* ═ STRIP ═ */
function renderStrip(){
  document.getElementById('PS').innerHTML=players.map((p,i)=>`
    <div class="pchip${i===turnIdx?' cur':''}" id="ch${p.id}">
      <div class="cd" style="background:${PC[p.ci]};box-shadow:0 0 4px ${PC[p.ci]};"></div>
      <span class="cn">${p.name}</span>
      <span class="cf" id="cf${p.id}">○</span>
    </div>`).join('');
}
function updateTurn(){
  const mine=myTurn();
  const cur=players[turnIdx];
  const tp=document.getElementById('TP');
  tp.textContent=mine?'دورك ← افتح صندوق':'دور '+cur?.name;
  tp.className='tpill'+(mine?' mine':'');
  players.forEach((p,i)=>{
    const c=document.getElementById('ch'+p.id);
    if(c)c.className='pchip'+(i===turnIdx?' cur':'');
  });
  // show fuse button only if my turn + my fire is open
  sv('BF',mine&&myFireOpen);
  sv('BC',false);sv('BX',false);
}
function advTurn(ti){
  turnIdx=ti;renderStrip();updateTurn();
}

/* ════ TAP BOX ════ */
function tapBox(i){
  if(gameOver)return;
  const cs=cellSt[i];
  if(cs.s==='lk')return;

  if(!myTurn()){toast('مش دورك!','tb',1400);return;}

  const tp=types[i];

  /* ── BOMB ── */
  if(tp==='bomb'){
    const el=document.getElementById('b'+i);
    el.className='box abl';el.innerHTML='💣';
    setTimeout(()=>{
      // collect hints that pointed to bomb
      const aff=[];
      for(let k=0;k<TOTAL;k++){
        if(cellSt[k].s==='hn'&&cellSt[k].hints.some(h=>h.bomb))aff.push(k);
      }
      const nb=movePiece('bomb',-1);
      // cell goes back to closed (not locked — just resets)
      cellSt[i].s='cl';cellSt[i].hints=[];
      renderCell(i);
      // update bomb hints in open cells
      aff.forEach(k=>{
        cellSt[k].hints=cellSt[k].hints.filter(h=>!h.bomb);
        const newBHint=computeBombHint(k);
        if(newBHint)cellSt[k].hints.push(newBHint);
        if(cellSt[k].hints.length===0)cellSt[k].s='cl';
        renderCell(k);
      });
      setS('💣 القنبلة اتحركت! تلميحاتها اتحدّثت','w');
      toast('💣 القنبلة هربت!','tb');
      const nt=(turnIdx+1)%players.length;
      ch.publish('ac',{t:'bomb',from:i,nb,aff,nt});
      advTurn(nt);
    },450);
    return;
  }

  /* ── FIRE ── */
  if(tp&&tp.startsWith('fire_')){
    const pi=parseInt(tp.split('_')[1]);
    if(pi===myI()){
      // Own fire: open it
      cellSt[i].s='fire';
      myFireOpen=true;
      const cf=document.getElementById('cf'+myId);if(cf)cf.textContent='🔥';
      renderCell(i);
      setS('🔥 وجدت شعلتك! ارسم الفتيل للقنبلة','g');
      toast('🔥 شعلتك اتكشفت!','tg');
      const nt=(turnIdx+1)%players.length;
      ch.publish('ac',{t:'fo',idx:i,pi,pid:myId,nt});
      advTurn(nt);
    } else {
      // Someone else's fire: LOCK permanently + move + clean hints
      const aff=[];
      for(let k=0;k<TOTAL;k++){
        if(cellSt[k].s==='hn'&&cellSt[k].hints.some(h=>!h.bomb&&h.pi===pi))aff.push(k);
      }
      cellSt[i].s='lk';cellSt[i].hints=[];
      const el=document.getElementById('b'+i);if(el)el.classList.add('alk');
      renderCell(i);
      const nf=movePiece('fire_'+pi,pi);
      // update hints: remove that fire's arrows from open cells
      aff.forEach(k=>{
        cellSt[k].hints=cellSt[k].hints.filter(h=>h.bomb||h.pi!==pi);
        if(cellSt[k].hints.length===0)cellSt[k].s='cl';
        renderCell(k);
      });
      // if the locked fire was mine and I had it open, reset
      if(players[pi]?.id===myId){
        myFireOpen=false;
        const cf=document.getElementById('cf'+myId);if(cf)cf.textContent='○';
      }
      setS(`🔒 شعلة ${players[pi]?.name} اتقفلت وتحركت!`,'w');
      toast(`🔒 قفلت شعلة ${players[pi]?.name}!`,'tb');
      const nt=(turnIdx+1)%players.length;
      ch.publish('ac',{t:'fl',idx:i,pi,nf,aff,pid:myId,nt});
      advTurn(nt);
    }
    return;
  }

  /* ── EMPTY CELL ── */
  if(cs.s==='hn'){
    // re-opening already open cell: just close it (costs a turn)
    cellSt[i].s='cl';cellSt[i].hints=[];
    renderCell(i);
    const nt=(turnIdx+1)%players.length;
    ch.publish('ac',{t:'cl',idx:i,nt});
    advTurn(nt);
  } else {
    // open: compute hints and display
    cellSt[i].s='hn';
    cellSt[i].hints=computeHints(i);
    renderCell(i);
    const nt=(turnIdx+1)%players.length;
    ch.publish('ac',{t:'op',idx:i,hints:cellSt[i].hints,nt});
    advTurn(nt);
  }
}

/* ════ HINT COMPUTATION — سهم واحد بس للأقرب ════ */
function computeHints(idx){
  // أقرب شعلة مكشوفة
  let nearFire=null,nearDist=Infinity;
  players.forEach((p,pi)=>{
    const fi=fpos[pi];
    if(fi===undefined||fi===null||fi===idx)return;
    if(cellSt[fi]?.s!=='fire')return;
    const d=cheb(idx,fi);
    if(d<nearDist){nearDist=d;nearFire={pi,tgt:fi,bomb:false};}
  });
  const bh=computeBombHint(idx);
  const bDist=bh?cheb(idx,bIdx):Infinity;
  // بيعرض الأقرب بس — الشعلة بتاخد أولوية لو مسافة متساوية
  if(nearFire&&nearDist<=bDist)return[nearFire];
  if(bh)return[bh];
  return[];
}
function computeBombHint(idx){
  if(bIdx<0||bIdx===idx)return null;
  return{pi:-1,tgt:bIdx,bomb:true};
}

/* ════ MOVE PIECE ════ */
function movePiece(ptype,pi){
  const cands=[];
  for(let i=0;i<TOTAL;i++){
    if(types[i]==='empty'&&cellSt[i].s==='cl')cands.push(i);
  }
  if(!cands.length)return -1;
  const np=cands[Math.random()*cands.length|0];
  if(ptype==='bomb'){types[bIdx]='empty';bIdx=np;}
  else{types[fpos[pi]]='empty';fpos[pi]=np;}
  types[np]=ptype;
  return np;
}

/* ════ REMOTE ACTION HANDLER ════ */
function handleAC(d){
  if(d.t==='op'){
    cellSt[d.idx].s='hn';cellSt[d.idx].hints=d.hints;renderCell(d.idx);
  } else if(d.t==='cl'){
    cellSt[d.idx].s='cl';cellSt[d.idx].hints=[];renderCell(d.idx);
  } else if(d.t==='fo'){
    cellSt[d.idx].s='fire';renderCell(d.idx);
    const cf=document.getElementById('cf'+d.pid);if(cf)cf.textContent='🔥';
    if(d.pid===myId){myFireOpen=true;}
  } else if(d.t==='fl'){
    cellSt[d.idx].s='lk';renderCell(d.idx);
    types[fpos[d.pi]]='empty';fpos[d.pi]=d.nf;types[d.nf]='fire_'+d.pi;
    d.aff.forEach(k=>{
      cellSt[k].hints=cellSt[k].hints.filter(h=>h.bomb||h.pi!==d.pi);
      if(cellSt[k].hints.length===0)cellSt[k].s='cl';
      renderCell(k);
    });
    if(d.pid===myId||players[d.pi]?.id===myId){
      myFireOpen=false;
      const cf=document.getElementById('cf'+myId);if(cf)cf.textContent='○';
      toast('🔒 شعلتك اتقفلت وتحركت!','tb');
    }
  } else if(d.t==='bomb'){
    types[bIdx]='empty';bIdx=d.nb;types[d.nb]='bomb';
    cellSt[d.from].s='cl';cellSt[d.from].hints=[];renderCell(d.from);
    d.aff.forEach(k=>{
      cellSt[k].hints=cellSt[k].hints.filter(h=>!h.bomb);
      const nb=computeBombHint(k);
      if(nb)cellSt[k].hints.push(nb);
      if(cellSt[k].hints.length===0)cellSt[k].s='cl';
      renderCell(k);
    });
  }
  // advance turn
  if(d.nt!==undefined)advTurn(d.nt);
}

/* ════ DRAW / FUSE ════ */
function startDraw(){
  if(!myFireOpen||!myTurn())return;
  drawMode=true;drawing=false;path=[];
  sv('BF',false);sv('BC',true);sv('BX',false);
  setS('ابدأ من شعلتك واسحب خط للقنبلة (الصناديق المقفولة فقط)','d');
  buildGrid();
}
function cancelDraw(){
  path.forEach(i=>{const e=document.getElementById('b'+i);if(e)e.classList.remove('dp');renderCell(i);});
  drawMode=drawing=false;path=[];
  sv('BC',false);sv('BX',false);sv('BF',myFireOpen&&myTurn());
  setS('','');buildGrid();
}

function startPath(e,i){
  const cs=cellSt[i];
  if(cs.s!=='fire')return;
  if(types[i]!=='fire_'+myI())return;
  e.target.setPointerCapture(e.pointerId);
  drawing=true;path=[i];
  document.getElementById('b'+i)?.classList.add('dp');
}
function extPath(i){
  if(!drawing)return;
  const cs=cellSt[i];
  if(cs.s!=='cl'&&cs.s!=='lk')return;
  const last=path[path.length-1];
  if(i===last)return;
  if(path.length>=2&&path[path.length-2]===i){
    const rem=path.pop();
    const e=document.getElementById('b'+rem);if(e){e.classList.remove('dp');renderCell(rem);}
    sv('BX',path.length>1);return;
  }
  if(!adj(last,i)||path.includes(i))return;
  path.push(i);
  document.getElementById('b'+i)?.classList.add('dp');
  sv('BX',path.length>1);
}

async function doExplode(){
  if(path.length<2)return;
  drawMode=false;
  sv('BC',false);sv('BX',false);
  const p=[...path];path=[];
  const hit=p[p.length-1]===bIdx;
  await animFuse(p,hit);
  ch.publish('fu',{p,hit,pn:myName});
  if(hit){
    gameOver=true;
    showWin(myName,true,myId);
    ch.publish('go',{wn:myName,wid:myId});
  } else {
    setS('❌ الفتيل مصابش القنبلة!','w');
    await wait(1300);
    buildGrid();
    sv('BF',myFireOpen&&myTurn());
    setS(myTurn()?'دورك: افتح صندوق 🔍':'دور '+players[turnIdx]?.name,'');
  }
}
async function doRemoteFuse(d){
  await animFuse(d.p,d.hit);
}
async function animFuse(p,hit){
  setS('🔥 الفتيل بيشتعل...','d');
  for(let i=1;i<p.length;i++){
    await wait(80);
    const e=document.getElementById('b'+p[i]);
    if(e){e.classList.add('aft');await wait(200);e.classList.remove('aft','dp');renderCell(p[i]);}
  }
  if(hit){
    await wait(100);
    const e=document.getElementById('b'+bIdx);
    if(e){e.className='box abw';e.innerHTML='💥';e.style.fontSize='1.3rem';}
  }
}

/* ════ WIN ════ */
// سجل الانتصارات — بيتحفظ طول الجلسة
let winsRecord={};  // {playerId: count}

function showWin(wn,isme,wid){
  gameOver=true;sv('BF',false);sv('BC',false);sv('BX',false);
  // سجل الفوز
  if(wid){winsRecord[wid]=(winsRecord[wid]||0)+1;}
  document.getElementById('WE').textContent=isme?'🏆':'😅';
  document.getElementById('WT').textContent=isme?'فزت! 🎉':wn+' فاز!';
  document.getElementById('WS').textContent=isme?'فجّرت القنبلة بنجاح!':'فجّر القنبلة قبلك!';
  // اعرض النتائج
  const sb=document.getElementById('scoresBox');
  const sorted=[...players].sort((a,b)=>(winsRecord[b.id]||0)-(winsRecord[a.id]||0));
  sb.innerHTML=sorted.map(p=>{
    const w=winsRecord[p.id]||0;
    const isW=p.id===wid;
    return`<div class="score-row">
      <div class="score-dot" style="background:${PC[p.ci]};box-shadow:0 0 4px ${PC[p.ci]};"></div>
      <div class="score-nm">${isW?'<span class="score-crown">👑</span>':''}${p.name}</div>
      <div class="score-wins">${w} ${w===1?'فوز':'انتصارات'}</div>
    </div>`;
  }).join('');
  document.getElementById('wo').style.display='flex';
  // show play again only if host
  sv('BAgn',isHost);
}

function playAgain(){
  if(!isHost)return;
  // بناء لعبة جديدة بنفس اللاعبين
  document.getElementById('wo').style.display='none';
  const s=buildGS();
  ch.publish('gs',s);
  applyGS(s);enterGame();
}

/* init */
sv('BF',false);sv('BC',false);sv('BX',false);
</script>
